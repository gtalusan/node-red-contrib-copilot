<script type="text/javascript">
    RED.nodes.registerType('copilot-prompt', {
        category: 'ai',
        color: '#e8dff5',
        defaults: {
            name: { value: '' },
            copilotConfig: { value: '', type: 'copilot-config', required: true },
            model: { value: '' },
            reasoningEffort: { value: '' },
            timeout: { value: 60000 },
            conversationId: { value: '' },
            sessionTimeout: { value: 30 },
        },
        inputs: 1,
        outputs: 2,
        outputLabels: ['response', 'error'],
        icon: 'copilot.svg',
        label: function () {
            return this.name || 'copilot';
        },
        paletteLabel: 'copilot',
        oneditprepare: function () {
            const nodeId = this.id;
            const savedModel = this.model;

            function loadModels(configId) {
                if (!configId) return;
                const $select = $('#node-input-model');
                $select.empty().append($('<option>', { value: '', text: '— loading… —', disabled: true, selected: true }));
                $.getJSON(`copilot/models?configId=${encodeURIComponent(configId)}`)
                    .done(function (models) {
                        $select.empty();
                        $select.append($('<option>', { value: '', text: '— select model —' }));
                        models.forEach(function (m) {
                            const cost = m.multiplier != null ? `(${m.multiplier}x)` : '';
                            $select.append($('<option>', { value: m.id, text: `${m.id} ${cost}`.trim() }));
                        });
                        if (savedModel) $select.val(savedModel);
                        if (!$select.val()) $select.prop('selectedIndex', 0);
                    })
                    .fail(function () {
                        $select.empty().append($('<option>', { value: savedModel || '', text: savedModel || '— unable to load —' }));
                    });
            }

            // Load models whenever the config node selection changes
            $('#node-input-copilotConfig').on('change', function () {
                loadModels($(this).val());
            });

            // Refresh button reloads the model list (bust cache, then reload)
            $('#copilot-model-refresh').on('click', function () {
                const configId = $('#node-input-copilotConfig').val();
                if (!configId) return;
                $.post(`copilot/models/refresh?configId=${encodeURIComponent(configId)}`)
                    .always(function () { loadModels(configId); });
            });

            // Initial load using the already-selected config node
            loadModels($('#node-input-copilotConfig').val());
        },
    });
</script>

<script type="text/html" data-template-name="copilot-prompt">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="copilot">
    </div>
    <div class="form-row">
        <label for="node-input-copilotConfig"><i class="fa fa-cog"></i> Config</label>
        <input type="text" id="node-input-copilotConfig">
    </div>
    <div class="form-row">
        <label for="node-input-model"><i class="fa fa-microchip"></i> Model</label>
        <select id="node-input-model" style="width:calc(70% - 34px)">
            <option value="">— select a config first —</option>
        </select>
        <button type="button" id="copilot-model-refresh" class="red-ui-button" style="margin-left:4px" title="Refresh model list">
            <i class="fa fa-refresh"></i>
        </button>
    </div>
    <div class="form-row">
        <label for="node-input-reasoningEffort"><i class="fa fa-brain"></i> Reasoning</label>
        <select id="node-input-reasoningEffort">
            <option value="">— default —</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="xhigh">xhigh</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Timeout (ms)</label>
        <input type="number" id="node-input-timeout" placeholder="60000" min="1000">
    </div>
    <div class="form-row">
        <label for="node-input-conversationId"><i class="fa fa-comments"></i> Conv. ID</label>
        <input type="text" id="node-input-conversationId" placeholder="(leave blank to use node ID)">
    </div>
    <div class="form-row">
        <label for="node-input-sessionTimeout"><i class="fa fa-hourglass-half"></i> Session idle (min)</label>
        <input type="number" id="node-input-sessionTimeout" placeholder="30" min="0">
    </div>
</script>

<script type="text/html" data-help-name="copilot-prompt">
    <p>Send a prompt (with optional attachments) to GitHub Copilot and receive a response.
    Conversations are stateful by default — context is preserved across messages in the same
    conversation thread.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | object</span></dt>
        <dd>
            A plain string is used as the prompt.<br>
            An object may contain <code>{ prompt, attachments }</code>.
        </dd>
        <dt class="optional">attachments <span class="property-type">array</span></dt>
        <dd>
            Array of attachment descriptors. Each may be:<br>
            <code>{ type: "file", path: "/abs/path" }</code><br>
            <code>{ type: "base64", data: "...", name: "img.jpg" }</code><br>
            <code>{ type: "buffer", data: Buffer, name: "file.bin" }</code>
        </dd>
        <dt class="optional">model <span class="property-type">string</span></dt>
        <dd>Override the model for this message (e.g. <code>"gpt-5"</code>).</dd>
        <dt class="optional">conversationId <span class="property-type">string</span></dt>
        <dd>
            Identifies the conversation thread to use. If omitted, defaults to the node's
            configured <em>Conv. ID</em>, or the node's own ID if that is also blank.
            Set a per-user value (e.g. a user ID or session token) to maintain separate
            conversation threads through a single node.
        </dd>
        <dt class="optional">reset <span class="property-type">boolean</span></dt>
        <dd>
            When <code>true</code>, destroys the active session for the resolved
            <code>conversationId</code> and swallows the message — nothing is sent to
            Copilot and no output is produced. Use this to start a conversation over
            from scratch. The next message will open a fresh session.
        </dd>
    </dl>

    <h3>Outputs</h3>
    <ol class="node-ports">
        <li>Response
            <dl class="message-properties">
                <dt>payload <span class="property-type">string</span></dt>
                <dd>The assistant's response text.</dd>
                <dt>conversationId <span class="property-type">string</span></dt>
                <dd>The conversation thread key used for this message.</dd>
                <dt>events <span class="property-type">array</span></dt>
                <dd>All session events emitted during the request.</dd>
            </dl>
        </li>
        <li>Error
            <dl class="message-properties">
                <dt>payload <span class="property-type">string</span></dt>
                <dd>Error message.</dd>
                <dt>error <span class="property-type">Error</span></dt>
                <dd>The error object.</dd>
            </dl>
        </li>
    </ol>

    <h3>Session lifecycle</h3>
    <p>
        Sessions are created on first use and kept alive between messages so that
        conversation context is preserved. A session is closed when:
    </p>
    <ul>
        <li>A message with <code>msg.reset = true</code> is received.</li>
        <li>The session has been idle longer than the configured <em>Session idle</em>
            timeout (default 30 min; set to <code>0</code> to disable).</li>
        <li>An error occurs — the session is discarded so the next message starts fresh.</li>
        <li>The node is redeployed or Node-RED shuts down.</li>
    </ul>
</script>
